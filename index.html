<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glycles — Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#aa0a28;
  --red2:#8c0820;
  --ink:#2a1418;
  --ink2:#5a4248;
  --muted:#8a7378;
  --dim:#b5a3a8;
  --glass:rgba(255,255,255,.55);
  --glass-h:rgba(255,255,255,.75);
  --glass-b:rgba(255,255,255,.7);
  --glass-bsel:var(--red);
  --field:rgba(255,255,255,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Onest',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;color:var(--ink);position:relative;overflow-x:hidden}

.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 880px 700px at 13% 15%, rgba(170,10,40,.20) 0%, transparent 58%),
  radial-gradient(ellipse 760px 640px at 88% 86%, rgba(196,120,90,.18) 0%, transparent 56%),
  radial-gradient(ellipse 640px 600px at 60% 48%, rgba(150,30,45,.12) 0%, transparent 55%),
  radial-gradient(ellipse 520px 500px at 82% 14%, rgba(214,180,150,.22) 0%, transparent 56%),
  linear-gradient(155deg,#f3ece4 0%,#efe4da 55%,#f1e6e0 100%)}
.bg-grain{position:fixed;inset:0;z-index:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

nav{position:sticky;top:0;z-index:99;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(255,255,255,.4);backdrop-filter:blur(20px) saturate(1.3);border-bottom:1px solid rgba(255,255,255,.5)}
.logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:-.02em;color:var(--ink)}
.logo b{color:var(--red)}
.lang{display:flex;gap:.25rem;background:rgba(255,255,255,.5);border-radius:100px;padding:.25rem;border:1px solid rgba(255,255,255,.7)}
.lang button{font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:700;padding:.3rem .7rem;border-radius:100px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:.15s;letter-spacing:.02em}
.lang button.active{background:var(--red);color:#fff}

.page{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
.intro{text-align:center;margin-bottom:2rem}
.intro h1{font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:900;letter-spacing:-.03em;line-height:1.05;color:var(--ink);margin-bottom:.75rem}
.intro h1 em{font-style:normal;color:var(--red)}
.intro p{font-size:.92rem;color:var(--ink2);line-height:1.65;font-weight:300;max-width:440px;margin:0 auto}

.card{background:rgba(255,255,255,.5);backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);border:1px solid rgba(255,255,255,.65);border-radius:24px;overflow:hidden;box-shadow:0 16px 60px rgba(90,40,30,.12)}
.prog-wrap{padding:1.5rem 1.75rem .5rem}
.prog-track{height:4px;background:rgba(170,10,40,.1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--red);border-radius:3px;transition:width .4s ease}
.prog-lbl{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:.5rem;font-weight:500}

.step-body{padding:.5rem 1.75rem 1.75rem}
.step-title{font-family:'Outfit',sans-serif;font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin:1.25rem 0 1.5rem}
.q{margin-bottom:1.75rem}
.q-text{font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.2rem}
.q-text .opt-tag{font-family:'Onest',sans-serif;font-size:.78rem;font-weight:400;color:var(--muted)}
.q-req{color:var(--red);margin-left:.15rem}
.q-hint{font-size:.78rem;color:var(--muted);font-weight:300;margin-bottom:.65rem}
.q-err{font-size:.74rem;color:var(--red);font-weight:500;margin-top:.4rem;display:none}
.q.invalid .q-err{display:block}
.q.invalid .opts-box{outline:1.5px solid rgba(170,10,40,.3);outline-offset:6px;border-radius:12px}

.opts{display:flex;flex-direction:column;gap:.4rem}
.opts.two{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt{display:flex;align-items:center;gap:.7rem;padding:.7rem .9rem;border-radius:12px;border:1.5px solid rgba(255,255,255,.75);background:rgba(255,255,255,.42);color:var(--ink2);font-size:.84rem;font-family:'Onest',sans-serif;cursor:pointer;transition:.15s;text-align:left;width:100%;line-height:1.3;backdrop-filter:blur(6px)}
.opt:hover{background:rgba(255,255,255,.7);border-color:rgba(170,10,40,.3)}
.opt.sel{border-color:var(--red);background:rgba(170,10,40,.07);color:var(--ink);font-weight:500}
.opt-mark{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.opt-mark.sq{border-radius:5px}
.opt.sel .opt-mark{background:var(--red);border-color:var(--red)}
.opt.sel .opt-mark::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.opt.sel .opt-mark.sq::after{border-radius:1px}

.other-wrap{margin-top:.5rem}
.field{width:100%;background:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.8);border-radius:12px;padding:.75rem .9rem;color:var(--ink);font-family:'Onest',sans-serif;font-size:.86rem;outline:none;transition:.15s}
.field:focus{border-color:rgba(170,10,40,.4);background:rgba(255,255,255,.8)}
.field::placeholder{color:var(--dim)}
textarea.field{min-height:84px;resize:vertical}

.slider-box{padding:.25rem 0}
.slider-ends{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:.65rem;font-weight:300}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;outline:none;cursor:pointer;background:rgba(170,10,40,.15)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--red);cursor:pointer;box-shadow:0 2px 8px rgba(170,10,40,.25);transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--red);cursor:pointer}
.slider-val{text-align:center;font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:800;color:var(--red);margin-top:.6rem}
.slider-desc{text-align:center;font-size:.74rem;color:var(--muted);margin-top:.1rem;font-weight:300}

.consent{display:flex;gap:.7rem;align-items:flex-start;padding:1rem;background:rgba(255,255,255,.4);border-radius:12px;border:1px solid rgba(255,255,255,.7);margin-top:.5rem}
.consent input{width:18px;height:18px;flex-shrink:0;margin-top:.1rem;accent-color:var(--red);cursor:pointer}
.consent label{font-size:.78rem;color:var(--ink2);line-height:1.55;font-weight:300;cursor:pointer}

.nav-row{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.75rem;border-top:1px solid rgba(255,255,255,.6)}
.btn-back{font-family:'Onest',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;transition:.15s;padding:.5rem 0}
.btn-back:hover{color:var(--ink)}
.btn-back.hide{visibility:hidden}
.btn-next{font-family:'Outfit',sans-serif;font-size:.86rem;font-weight:700;padding:.72rem 1.85rem;border-radius:100px;background:var(--red);color:#fff;border:none;cursor:pointer;transition:.15s;letter-spacing:.02em}
.btn-next:hover{background:var(--red2)}

/* Success screen */
.success{display:none;text-align:center;padding:3rem 2rem 2.5rem}
.success-ic{width:64px;height:64px;border-radius:50%;background:rgba(170,10,40,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.5rem;color:var(--red)}
.success h2{font-family:'Outfit',sans-serif;font-size:1.9rem;font-weight:900;color:var(--ink);margin-bottom:.75rem;letter-spacing:-.02em}
.success p{font-size:.9rem;color:var(--ink2);line-height:1.7;font-weight:300;max-width:380px;margin:0 auto}

.id-block{margin:1.75rem auto 0;max-width:420px;padding:1.1rem 1.25rem;background:rgba(255,255,255,.55);border-radius:16px;border:1px solid rgba(255,255,255,.75);text-align:left}
.id-block-label{font-size:.74rem;color:var(--ink2);font-weight:500;margin-bottom:.6rem;line-height:1.5}
.id-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.9rem}
.id-code{font-size:.75rem;background:rgba(170,10,40,.06);padding:.35rem .65rem;border-radius:8px;color:var(--ink);flex:1;word-break:break-all;font-family:monospace;line-height:1.4}
.btn-copy{font-family:'Outfit',sans-serif;font-size:.74rem;font-weight:700;padding:.35rem .9rem;border-radius:100px;background:var(--red);color:#fff;border:none;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0}
.btn-copy:hover{background:var(--red2)}
.delete-link{font-size:.74rem;color:var(--muted);font-weight:300;text-decoration:underline;cursor:pointer}
.delete-link:hover{color:var(--ink2)}

.disclaimer{position:relative;z-index:1;text-align:center;font-size:.7rem;color:var(--muted);padding:1.5rem;line-height:1.6;max-width:560px;margin:0 auto;font-weight:300}

@media(max-width:520px){
  nav{padding:0 1rem}
  .page{padding:1.5rem 1rem 3rem}
  .intro h1{font-size:1.9rem}
  .step-body,.nav-row,.prog-wrap{padding-left:1.25rem;padding-right:1.25rem}
  .opts.two{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grain"></div>

<nav>
  <div class="logo">gl<b>y</b>cles.</div>
  <div class="lang" id="lang">
    <button data-l="en">EN</button>
    <button data-l="de" class="active">DE</button>
    <button data-l="ru">RU</button>
  </div>
</nav>

<div class="page">
  <div class="intro">
    <h1 id="intro-h"></h1>
    <p id="intro-p"></p>
  </div>

  <div class="card" id="card">
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="prog-lbl"><span id="prog-step"></span><span id="prog-pct"></span></div>
    </div>
    <div class="step-body" id="step-body"></div>
    <div class="nav-row">
      <button class="btn-back hide" id="btn-back"></button>
      <button class="btn-next" id="btn-next"></button>
    </div>
  </div>

  <div class="card success" id="success">
    <div class="success-ic">✓</div>
    <h2 id="success-h"></h2>
    <p id="success-p"></p>
    <div class="id-block">
      <div class="id-block-label" id="id-block-label"></div>
      <div class="id-row">
        <span class="id-code" id="response-id-display"></span>
        <button class="btn-copy" id="copy-btn" onclick="copyId()"></button>
      </div>
      <a class="delete-link" id="delete-link" href="#" target="_blank"></a>
    </div>
  </div>
</div>

<div class="disclaimer" id="disclaimer"></div>

<script>
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbwAPnaRG27N_25KCq4BgKHBpNWVF97bA1D8MU3iiTx9WuZmoJBvOkzciAjtxkVUP9zd/exec';

const T = {
  header: {
  en: 'Your Cycle. Your Glucose. Your Input.',
  de: 'Dein Zyklus. Deine Glukose. Deine Meinung.',
  ru: 'Твой цикл. Твоя глюкоза. Твоё мнение.'
},
introP: {
  en: 'Living with a condition that affects your blood sugar is already complex — add a menstrual cycle to the picture, and the patterns get even harder to read. We\'re building an app to help track how glucose levels shift across cycle phases. Before we write a single line of code, we want to understand your real experience. This survey takes a few minutes, is completely anonymous, and directly shapes what we build. If you\'d like to help us test it, you can leave your email at the end — no obligation.',
  de: 'Mit einer Erkrankung zu leben, die den Blutzucker beeinflusst, ist bereits komplex — der Menstruationszyklus macht die Muster noch schwerer lesbar. Wir entwickeln eine App, die hilft, Glukoseveränderungen über die Zyklusphasen hinweg zu verfolgen. Bevor wir eine einzige Zeile Code schreiben, wollen wir deine echten Erfahrungen verstehen. Die Umfrage dauert wenige Minuten, ist vollständig anonym und beeinflusst direkt, was wir bauen. Wenn du beim Testen helfen möchtest, kannst du am Ende deine E-Mail hinterlassen — freiwillig.',
  ru: 'Жить с заболеванием, влияющим на уровень сахара в крови, уже непросто — а менструальный цикл делает картину ещё сложнее. Мы создаём приложение, которое поможет отслеживать изменения уровня глюкозы в разных фазах цикла. Прежде чем написать хоть строчку кода, мы хотим понять ваш реальный опыт. Опрос займёт несколько минут, полностью анонимен и напрямую влияет на то, что мы создадим. Если вы хотите помочь с тестированием — можете оставить email в конце, это необязательно.'
},
  step:{en:'Step',de:'Schritt',ru:'Шаг'},
  of:{en:'of',de:'von',ru:'из'},
  back:{en:'← Back',de:'← Zurück',ru:'← Назад'},
  next:{en:'Continue →',de:'Weiter →',ru:'Далее →'},
  submit:{en:'Submit ✦',de:'Absenden ✦',ru:'Отправить ✦'},
  optional:{en:'(optional)',de:'(optional)',ru:'(необязательно)'},
  multi:{en:'(select all that apply)',de:'(Mehrfachauswahl)',ru:'(можно выбрать несколько)'},
  other:{en:'Something else? Write here…',de:'Etwas anderes? Hier schreiben…',ru:'Что-то ещё? Напишите здесь…'},
  errReq:{en:'Please answer to continue.',de:'Bitte beantworten, um fortzufahren.',ru:'Пожалуйста, ответьте, чтобы продолжить.'},
  errConsent:{en:'Please confirm to submit.',de:'Bitte bestätigen zum Absenden.',ru:'Пожалуйста, подтвердите для отправки.'},
  successH:{en:'Thank you!',de:'Danke!',ru:'Спасибо!'},
  successP:{
    en:'Your answers are saved. If you fit the test phase, we will reach out by email with details about the free sensor and platform access.',
    de:'Deine Antworten sind gespeichert. Wenn du zur Testphase passt, melden wir uns per E-Mail mit Details zum kostenlosen Sensor und Plattformzugang.',
    ru:'Ваши ответы сохранены. Если Вы подходите для тест-фазы, мы напишем на email с деталями о бесплатном сенсоре и доступе к платформе.'
  },
  idBlockLabel:{
    en:'Save this ID if you ever want to delete your response (GDPR right to erasure):',

    ru:'Сохраните этот ID, если захотите удалить свой ответ (право на удаление по GDPR):'

  copyBtn:{en:'Copy',de:'Kopieren',ru:'Копировать'},
  copyDone:{en:'Copied ✓',de:'Kopiert ✓',ru:'Скопировано ✓'},
  deleteLink:{

    ru:'Удалить мой ответ'
  },
  disclaimer:{
    en:'We process the data you provide solely to evaluate demand and design our product, in line with GDPR. Answers are stored anonymously; providing contact details is optional. You may withdraw at any time by using the deletion link shown after submission. This is not a medical device and not medical advice.',
    de:'Wir verarbeiten deine Angaben ausschließlich zur Bewertung der Nachfrage und Produktgestaltung, gemäß DSGVO. Antworten werden anonym gespeichert; die Angabe von Kontaktdaten ist freiwillig. Du kannst jederzeit über den nach dem Absenden angezeigten Lösch-Link widerrufen. Dies ist kein Medizinprodukt und keine medizinische Beratung.',
    ru:'Мы обрабатываем Ваши данные исключительно для оценки спроса и разработки продукта, в соответствии с GDPR. Ответы хранятся анонимно; указание контактов необязательно. Вы можете отозвать согласие в любой момент с помощью ссылки удаления. Не медицинское изделие и не медицинская рекомендация.'
  },
};

const SLIDER_LABELS = {
  intensity:{
    en:['None','Barely','Mild','A bit bothersome','Noticeable','Manageable','Clear','Strong','Very strong','Severe','Extreme'],
    de:['Keine','Kaum','Leicht','Etwas lästig','Merklich','Handhabbar','Deutlich','Stark','Sehr stark','Schwer','Extrem'],
    ru:['Нет','Едва','Слабо','Немного мешает','Заметно','Терпимо','Определенно','Сильно','Очень сильно','Тяжело','Невыносимо']
  },
  diff:{
    en:['No difference','Barely','Very slight','Slight','Somewhat','Clear','Very clear','Strongly different','Completely','Almost foreign','Like two people'],
    de:['Kein Unterschied','Kaum','Sehr leicht','Leicht','Etwas','Deutlich','Sehr deutlich','Stark verschieden','Komplett','Fast fremd','Wie zwei Menschen'],
    ru:['Разницы нет','Едва','Очень слабо','Слабо','Немного','Чётко','Очень чётко','Сильно по-разному','Полностью','Абсолютно','Как два разных человека']
  }
};

const SURVEY = [
  { title:{en:'About you',de:'Über dich',ru:'О Вас'}, questions:[
    { id:'age', type:'single', required:true,
      label:{en:'How old are you?',de:'Wie alt bist du?',ru:'Сколько Вам лет?'},
      grid:true,
      options:[

        {v:'25-30',l:{en:'25–30',de:'25–30',ru:'25–30'}},
        {v:'31-36',l:{en:'31–36',de:'31–36',ru:'31–36'}},
        {v:'37-44',l:{en:'37–44',de:'37–44',ru:'37–44'}},

        {v:'55+',l:{en:'55+',de:'55+',ru:'55+'}},
      ]},
    { id:'sex', type:'single', required:true,
      label:{en:'Sex',de:'Geschlecht',ru:'Пол'},
      grid:true,
      options:[
        {v:'f',l:{en:'Female',de:'Weiblich',ru:'Женский'}},
        {v:'m',l:{en:'Male',de:'Männlich',ru:'Мужской'}},
        {v:'d',l:{en:'Diverse',de:'Divers',ru:'Другой'}},
        {v:'na',l:{en:'Prefer not to say',de:'Keine Angabe',ru:'Не указывать'}},

    { id:'occupation', type:'multi', required:true, allowOther:true,
      label:{en:'Do you work or study?',de:'Arbeitest oder studierst du?',ru:'Вы работаете или учитесь?'},
      grid:true,
      options:[
        {v:'study',l:{en:'I study',de:'Ich studiere',ru:'Я учусь'}},
        {v:'w20',l:{en:'Work under 20h / week',de:'Arbeit unter 20 Std./Woche',ru:'Работа менее 20ч/нед'}},

        {v:'w40',l:{en:'More than 40h / week',de:'Mehr als 40 Std./Woche',ru:'Более 40ч/нед'}},
        {v:'none',l:{en:'None of the above',de:'Nichts davon',ru:'Ничего из перечисленного'}},

    { id:'smartphone', type:'single', required:true,
      label:{en:'Which smartphone do you use?',de:'Welches Smartphone nutzt du?',ru:'Каким смартфоном Вы пользуетесь?'},

      options:[

        {v:'other',l:{en:'Other / none',de:'Anderes / keins',ru:'Другое / нет'}},
      ]},
  ]},

  { title:{en:'Health',de:'Gesundheit',ru:'Здоровье'}, questions:[
    { id:'horm', type:'single', required:true, grid:true,

        {v:'pill',l:{en:'Combined pill',de:'Kombi-Pille',ru:'Комбинированные таблетки (КОК)'}},
        {v:'minipill',l:{en:'Mini pill (progestogen)',de:'Minipille (Gestagen)',ru:'Мини-пили (прогестин)'}},
        {v:'iud',l:{en:'Hormonal IUD',de:'Hormonspirale',ru:'Внутриматочная спираль'}},
        {v:'ring',l:{en:'Vaginal ring',de:'Vaginalring',ru:'Вагинальное кольцо'}},
        {v:'patch',l:{en:'Patch',de:'Verhütungspflaster',ru:'Пластырь'}},
        {v:'injection',l:{en:'Injection',de:'Dreimonatsspritze',ru:'Инъекции'}},
        {v:'implant',l:{en:'Implant',de:'Hormonimplantat',ru:'Имплантат'}},
        {v:'other',l:{en:'Other',de:'Anderes',ru:'Другое'}},

let lang = 'de';
let stepIdx = 0;
const answers = {};

function activeSteps(){
  return SURVEY.filter(s => {
    if(!s.showIf) return true;
    return answers[s.showIf.q] === s.showIf.v;
  });
}

function L(obj){ return obj[lang] || obj.en; }

function render(){
  const steps = activeSteps();
  if(stepIdx >= steps.length) stepIdx = steps.length - 1;
  const step = steps[stepIdx];

  const pct = Math.round((stepIdx + 1) / steps.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-step').textContent = `${L(T.step)} ${stepIdx+1} ${L(T.of)} ${steps.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';

  const body = document.getElementById('step-body');
  body.innerHTML = `<div class="step-title">${L(step.title)}</div>`;
  step.questions.forEach(q => { body.appendChild(renderQ(q)); });

  const back = document.getElementById('btn-back');
  back.classList.toggle('hide', stepIdx === 0);
  back.textContent = L(T.back);
  const next = document.getElementById('btn-next');
  next.textContent = (stepIdx === steps.length - 1) ? L(T.submit) : L(T.next);
}

function renderQ(q){
  const wrap = document.createElement('div');
  wrap.className = 'q'; wrap.dataset.qid = q.id;

  let tag = '';
  if(q.type === 'multi') tag = ` <span class="opt-tag">${L(T.multi)}</span>`;
  else if(!q.required) tag = ` <span class="opt-tag">${L(T.optional)}</span>`;
  const req = q.required ? '<span class="q-req">*</span>' : '';
  wrap.innerHTML = `<div class="q-text">${L(q.label)}${req}${tag}</div>`;
  if(q.hint) wrap.innerHTML += `<div class="q-hint">${L(q.hint)}</div>`;

  const box = document.createElement('div'); box.className = 'opts-box';

  if(q.type === 'single' || q.type === 'multi'){
    const opts = document.createElement('div');
    opts.className = 'opts' + (q.grid ? ' two' : '');
    q.options.forEach(o => {
      const b = document.createElement('button');
      b.className = 'opt';
      const cur = answers[q.id];
      const isSel = q.type === 'single' ? cur === o.v : Array.isArray(cur) && cur.includes(o.v);
      if(isSel) b.classList.add('sel');
      b.innerHTML = `<span class="opt-mark${q.type === 'multi' ? ' sq' : ''}"></span>${L(o.l)}`;
      b.onclick = () => {
        if(q.type === 'single'){
          answers[q.id] = o.v;
          render();
        } else {
          if(!Array.isArray(answers[q.id])) answers[q.id] = [];
          const i = answers[q.id].indexOf(o.v);
          if(i >= 0) answers[q.id].splice(i, 1); else answers[q.id].push(o.v);
          b.classList.toggle('sel');
          wrap.classList.remove('invalid');
        }
      };
      opts.appendChild(b);
    });
    box.appendChild(opts);

    if(q.allowOther){
      const ow = document.createElement('div'); ow.className = 'other-wrap';
      const inp = document.createElement('input');
      inp.className = 'field'; inp.type = 'text';
      inp.placeholder = L(T.other);
      inp.value = answers[q.id + '_other'] || '';
      inp.oninput = () => { answers[q.id + '_other'] = inp.value; };
      ow.appendChild(inp); box.appendChild(ow);
    }
  }
  else if(q.type === 'slider'){
    const sb = document.createElement('div'); sb.className = 'slider-box';
    const labels = SLIDER_LABELS[q.sliderType][lang];
    const val = (answers[q.id] !== undefined) ? answers[q.id] : 5;
    answers[q.id] = val;
    sb.innerHTML = `<div class="slider-ends"><span>${L({en:q.ends.en[0],de:q.ends.de[0],ru:q.ends.ru[0]})}</span><span>${L({en:q.ends.en[1],de:q.ends.de[1],ru:q.ends.ru[1]})}</span></div>`;
    const rng = document.createElement('input');
    rng.type = 'range'; rng.min = 0; rng.max = 10; rng.value = val;
    const valEl = document.createElement('div'); valEl.className = 'slider-val'; valEl.textContent = val;
    const descEl = document.createElement('div'); descEl.className = 'slider-desc'; descEl.textContent = labels[val];
    function paint(){ rng.style.background = `linear-gradient(to right,var(--red) ${rng.value*10}%,rgba(170,10,40,.15) ${rng.value*10}%)`; }
    rng.oninput = () => { answers[q.id] = +rng.value; valEl.textContent = rng.value; descEl.textContent = labels[rng.value]; paint(); };
    paint();
    sb.appendChild(rng); sb.appendChild(valEl); sb.appendChild(descEl);
    box.appendChild(sb);
  }
  else if(q.type === 'text'){
    const inp = document.createElement('input');
    inp.className = 'field'; inp.type = q.inputType || 'text';
    inp.placeholder = q.placeholder ? L(q.placeholder) : '';
    inp.value = answers[q.id] || '';
    inp.oninput = () => { answers[q.id] = inp.value; };
    box.appendChild(inp);
  }
  else if(q.type === 'textarea'){
    const ta = document.createElement('textarea');
    ta.className = 'field'; ta.placeholder = q.placeholder ? L(q.placeholder) : '';
    ta.value = answers[q.id] || '';
    ta.oninput = () => { answers[q.id] = ta.value; };
    box.appendChild(ta);
  }
  else if(q.type === 'consent'){
    const c = document.createElement('div'); c.className = 'consent';
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.id = 'consent-cb';
    cb.checked = !!answers[q.id];
    cb.onchange = () => { answers[q.id] = cb.checked; wrap.classList.remove('invalid'); };
    const lab = document.createElement('label'); lab.htmlFor = 'consent-cb'; lab.textContent = L(q.label);
    c.appendChild(cb); c.appendChild(lab);
    box.appendChild(c);
  }

  wrap.appendChild(box);
  const err = document.createElement('div'); err.className = 'q-err';
  err.textContent = q.type === 'consent' ? L(T.errConsent) : L(T.errReq);
  wrap.appendChild(err);
  return wrap;
}

function validateStep(){
  const steps = activeSteps();
  const step = steps[stepIdx];
  let ok = true;
  step.questions.forEach(q => {
    if(!q.required) return;
    const el = document.querySelector(`.q[data-qid="${q.id}"]`);
    let answered = false;
    const v = answers[q.id];
    if(q.type === 'multi') answered = Array.isArray(v) && v.length > 0;
    else if(q.type === 'consent') answered = v === true;
    else if(q.type === 'slider') answered = v !== undefined;
    else answered = v !== undefined && v !== '';
    if(!answered){ ok = false; if(el) el.classList.add('invalid'); }
  });
  return ok;
}

document.getElementById('btn-next').onclick = () => {
  if(!validateStep()){
    const bad = document.querySelector('.q.invalid');
    if(bad) bad.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  const steps = activeSteps();
  if(stepIdx === steps.length - 1){ submitSurvey(); return; }
  stepIdx++; render();
  document.getElementById('card').scrollIntoView({behavior:'smooth', block:'start'});
};

document.getElementById('btn-back').onclick = () => {
  if(stepIdx > 0){ stepIdx--; render(); document.getElementById('card').scrollIntoView({behavior:'smooth', block:'start'}); }
};

document.getElementById('lang').addEventListener('click', e => {
  if(e.target.tagName !== 'BUTTON') return;
  lang = e.target.dataset.l;
  document.documentElement.lang = lang;
  document.querySelectorAll('#lang button').forEach(b => b.classList.toggle('active', b.dataset.l === lang));
  paintStatic(); render();
});

function paintStatic(){
  const h = T.introH[lang];
  document.getElementById('intro-h').innerHTML = `${h[0]}<em>${h[1]}</em>`;
  document.getElementById('intro-p').textContent = L(T.introP);
  document.getElementById('disclaimer').textContent = L(T.disclaimer);
  document.getElementById('success-h').textContent = L(T.successH);
  document.getElementById('success-p').textContent = L(T.successP);
  document.getElementById('id-block-label').textContent = L(T.idBlockLabel);
  document.getElementById('copy-btn').textContent = L(T.copyBtn);
  document.getElementById('delete-link').textContent = L(T.deleteLink);
}

function buildPayload(){
  return {
    response_id: 'r_' + Math.random().toString(36).slice(2) + Date.now().toString(36),
    submitted_at: new Date().toISOString(),
    language: lang,
    answers: answers
  };
}

async function submitSurvey(){
  const payload = buildPayload();
  try {
    await fetch(ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });
  } catch(e){ console.error('submit failed', e); }
  try {
    const all = JSON.parse(localStorage.getItem('glycles_responses') || '[]');
    all.push(payload);
    localStorage.setItem('glycles_responses', JSON.stringify(all));
  } catch(e){}
  showSuccessWithId(payload.response_id);
}

function showSuccessWithId(responseId){
  document.getElementById('response-id-display').textContent = responseId;
  document.getElementById('delete-link').href = ENDPOINT + '?delete_id=' + responseId;
  document.getElementById('card').style.display = 'none';
  document.getElementById('success').style.display = 'block';
  document.getElementById('success').scrollIntoView({behavior:'smooth', block:'center'});
}

function copyId(){
  const id = document.getElementById('response-id-display').textContent;
  navigator.clipboard.writeText(id).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = L(T.copyDone);
    setTimeout(() => { btn.textContent = L(T.copyBtn); }, 1800);
  });
}

paintStatic();
render();
</script>
</body>
</html>
